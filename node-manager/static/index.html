<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Node Manager</title>
  <style>
    :root { color-scheme: light; font-family: Arial, "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f6f8; color: #17202a; }
    header { background: #17202a; color: #fff; padding: 18px 24px; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    main { width: min(1080px, calc(100% - 32px)); margin: 24px auto 48px; }
    .toolbar { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; margin-bottom: 20px; }
    label { display: grid; gap: 6px; color: #485460; font-size: 13px; }
    input { min-width: 260px; height: 38px; border: 1px solid #b8c2cc; border-radius: 4px; padding: 0 10px; background: #fff; }
    button, a.button { min-height: 38px; border: 0; border-radius: 4px; padding: 0 14px; background: #1261a0; color: #fff; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    button.secondary, a.secondary { background: #52616b; }
    button.danger { background: #a93226; }
    .status-grid { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric { background: #fff; border: 1px solid #dbe1e6; border-radius: 6px; padding: 14px; min-height: 88px; }
    .metric span { display: block; color: #65737e; font-size: 12px; margin-bottom: 10px; }
    .metric strong { font-size: 20px; overflow-wrap: anywhere; }
    section { border-top: 1px solid #ccd4da; padding-top: 20px; margin-top: 20px; }
    h2 { margin: 0 0 14px; font-size: 17px; }
    .form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    .protocols { display: flex; gap: 12px; min-height: 38px; align-items: center; }
    .protocols label { display: flex; align-items: center; gap: 5px; }
    .protocols input { min-width: auto; width: 16px; height: 16px; }
    pre { margin: 14px 0 0; padding: 14px; background: #101820; color: #d8e2e8; border-radius: 4px; overflow: auto; min-height: 72px; white-space: pre-wrap; overflow-wrap: anywhere; }
    .table-wrap { width: 100%; overflow-x: auto; border: 1px solid #dbe1e6; border-radius: 6px; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid #e6eaed; text-align: left; font-size: 13px; white-space: nowrap; }
    th { background: #eef2f5; color: #485460; font-weight: 600; }
    tbody tr:last-child td { border-bottom: 0; }
    .empty { color: #65737e; text-align: center; padding: 24px; }
    .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .section-heading h2 { margin: 0; }
    .ok { color: #14804a; }
    .bad { color: #b42318; }
    @media (max-width: 760px) {
      .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      input { min-width: 100%; width: 100%; }
      label { width: 100%; }
    }
  </style>
</head>
<body>
  <header><h1>Node Manager</h1></header>
  <main>
    <div class="toolbar">
      <label>API Token<input id="token" type="password" autocomplete="off"></label>
      <button id="save-token">保存 Token</button>
      <button id="refresh" class="secondary">刷新状态</button>
      <a class="button secondary" href="/docs" target="_blank" rel="noreferrer">API 文档</a>
    </div>

    <div class="status-grid">
      <div class="metric"><span>节点</span><strong id="node">-</strong></div>
      <div class="metric"><span>sing-box</span><strong id="singbox">-</strong></div>
      <div class="metric"><span>CPU</span><strong id="cpu">-</strong></div>
      <div class="metric"><span>内存</span><strong id="memory">-</strong></div>
      <div class="metric"><span>连接数</span><strong id="connections">-</strong></div>
    </div>

    <section>
      <h2>创建用户</h2>
      <div class="form-row">
        <label>用户 ID<input id="create-user-id" placeholder="例如 user-10001"></label>
        <label>本节点 SOCKS5 用户名（可选）<input id="create-socks-username" autocomplete="off"></label>
        <label>本节点 SOCKS5 密码（可选）<input id="create-socks-password" type="password" autocomplete="new-password"></label>
        <label>住宅 SOCKS5 IP（可选）<input id="create-proxy-server" autocomplete="off"></label>
        <label>住宅端口<input id="create-proxy-port" type="number" min="1" max="65535" value="1080"></label>
        <label>住宅用户名（可选）<input id="create-proxy-username" autocomplete="off"></label>
        <label>住宅密码（可选）<input id="create-proxy-password" type="password" autocomplete="new-password"></label>
        <div class="protocols">
          <label><input type="checkbox" value="vless" checked>VLESS</label>
          <label><input type="checkbox" value="vmess" checked>VMess</label>
          <label><input type="checkbox" value="socks" checked>SOCKS5</label>
        </div>
        <button id="create-user">创建</button>
      </div>
      <pre id="create-result">等待操作</pre>
    </section>

    <section>
      <div class="section-heading">
        <h2>用户列表</h2>
        <button id="refresh-users" class="secondary">刷新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>用户 ID</th><th>协议</th><th>SOCKS5 用户名</th><th>住宅出口</th><th>流量</th><th>状态</th></tr></thead>
          <tbody id="user-list"><tr><td colspan="6" class="empty">等待加载</td></tr></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="section-heading">
        <h2>节点列表</h2>
        <button id="refresh-nodes" class="secondary">刷新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>节点</th><th>地址</th><th>状态</th><th>版本</th><th>资源</th><th>用户数</th></tr></thead>
          <tbody id="node-list"><tr><td colspan="6" class="empty">等待加载</td></tr></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>绑定住宅 SOCKS5 出口</h2>
      <div class="form-row">
        <label>用户 ID<input id="bind-user-id"></label>
        <label>服务器<input id="proxy-server"></label>
        <label>端口<input id="proxy-port" type="number" min="1" max="65535" value="1080"></label>
        <label>用户名<input id="proxy-username"></label>
        <label>密码<input id="proxy-password" type="password"></label>
        <button id="bind-proxy">绑定</button>
      </div>
      <pre id="bind-result">等待操作</pre>
    </section>

    <section>
      <h2>删除用户</h2>
      <div class="form-row">
        <label>用户 ID<input id="delete-user-id"></label>
        <button id="delete-user" class="danger">删除</button>
      </div>
      <pre id="delete-result">等待操作</pre>
    </section>
  </main>
  <script>
    const tokenInput = document.getElementById('token');
    tokenInput.value = sessionStorage.getItem('node-manager-token') || '';

    function headers() {
      return { 'Authorization': `Bearer ${tokenInput.value.trim()}`, 'Content-Type': 'application/json' };
    }

    async function request(path, options = {}) {
      const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.detail || `HTTP ${response.status}`);
      return body;
    }

    function show(id, value, error = false) {
      const element = document.getElementById(id);
      element.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      element.className = error ? 'bad' : 'ok';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, character => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      })[character]);
    }

    function formatBytes(value) {
      const bytes = Number(value || 0);
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      return `${(bytes / 1024 / 1024 / 1024).toFixed(1)} GB`;
    }

    async function refreshUsers() {
      const target = document.getElementById('user-list');
      try {
        const data = await request('/api/users?page=1&pageSize=100');
        target.innerHTML = data.items.length ? data.items.map(item => `<tr>
          <td>${escapeHtml(item.userId)}</td>
          <td>${escapeHtml(item.protocols.join(', '))}</td>
          <td>${escapeHtml(item.socksUsername || '-')}</td>
          <td>${escapeHtml(item.proxyBound ? item.proxyServer : '未绑定')}</td>
          <td>↑ ${formatBytes(item.upload)} / ↓ ${formatBytes(item.download)}</td>
          <td class="ok">${escapeHtml(item.status)}</td>
        </tr>`).join('') : '<tr><td colspan="6" class="empty">暂无用户</td></tr>';
      } catch (error) {
        target.innerHTML = `<tr><td colspan="6" class="empty bad">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    async function refreshNodes() {
      const target = document.getElementById('node-list');
      try {
        const data = await request('/api/nodes?page=1&pageSize=100');
        target.innerHTML = data.items.length ? data.items.map(item => `<tr>
          <td>${escapeHtml(item.name)}<br><small>${escapeHtml(item.nodeId)}</small></td>
          <td>${escapeHtml(item.domain || item.host)}</td>
          <td class="${item.status === 'online' ? 'ok' : 'bad'}">${escapeHtml(item.status)}</td>
          <td>Manager ${escapeHtml(item.managerVersion)}<br>sing-box ${escapeHtml(item.singboxVersion)}</td>
          <td>CPU ${escapeHtml(item.cpu)}% / 内存 ${escapeHtml(item.memory)}%</td>
          <td>${escapeHtml(item.userCount)}</td>
        </tr>`).join('') : '<tr><td colspan="6" class="empty">暂无节点</td></tr>';
      } catch (error) {
        target.innerHTML = `<tr><td colspan="6" class="empty bad">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    async function refresh() {
      try {
        const data = await request('/api/node/status');
        document.getElementById('node').textContent = `${data.name} (${data.host})`;
        document.getElementById('singbox').textContent = data.singbox;
        document.getElementById('cpu').textContent = `${data.cpu}%`;
        document.getElementById('memory').textContent = `${data.memory}%`;
        document.getElementById('connections').textContent = data.connections;
        await Promise.all([refreshUsers(), refreshNodes()]);
      } catch (error) {
        document.getElementById('singbox').textContent = error.message;
      }
    }

    document.getElementById('save-token').onclick = () => {
      sessionStorage.setItem('node-manager-token', tokenInput.value.trim());
      refresh();
    };
    document.getElementById('refresh').onclick = refresh;
    document.getElementById('refresh-users').onclick = refreshUsers;
    document.getElementById('refresh-nodes').onclick = refreshNodes;
    document.getElementById('create-user').onclick = async () => {
      const protocols = [...document.querySelectorAll('.protocols input:checked')].map(item => item.value);
      const socksUsername = document.getElementById('create-socks-username').value.trim() || null;
      const socksPassword = document.getElementById('create-socks-password').value || null;
      const proxyServer = document.getElementById('create-proxy-server').value.trim();
      const proxyPort = Number(document.getElementById('create-proxy-port').value);
      const proxyUsername = document.getElementById('create-proxy-username').value || null;
      const proxyPassword = document.getElementById('create-proxy-password').value || null;
      const proxy = proxyServer ? {
        type: 'socks5',
        server: proxyServer,
        port: proxyPort,
        username: proxyUsername,
        password: proxyPassword
      } : null;
      try {
        show('create-result', await request('/api/user/create', {
          method: 'POST',
          body: JSON.stringify({
            userId: document.getElementById('create-user-id').value.trim(),
            protocols,
            socksUsername,
            socksPassword,
            proxy
          })
        }));
        await refreshUsers();
      } catch (error) { show('create-result', error.message, true); }
    };
    document.getElementById('bind-proxy').onclick = async () => {
      try {
        show('bind-result', await request('/api/user/bind-proxy', {
          method: 'POST',
          body: JSON.stringify({
            userId: document.getElementById('bind-user-id').value.trim(),
            proxy: {
              type: 'socks5',
              server: document.getElementById('proxy-server').value.trim(),
              port: Number(document.getElementById('proxy-port').value),
              username: document.getElementById('proxy-username').value || null,
              password: document.getElementById('proxy-password').value || null
            }
          })
        }));
        await refreshUsers();
      } catch (error) { show('bind-result', error.message, true); }
    };
    document.getElementById('delete-user').onclick = async () => {
      const userId = document.getElementById('delete-user-id').value.trim();
      if (!userId || !confirm(`确认删除用户 ${userId}？`)) return;
      try {
        show('delete-result', await request(`/api/user/delete/${encodeURIComponent(userId)}`, { method: 'DELETE' }));
        await refreshUsers();
      }
      catch (error) { show('delete-result', error.message, true); }
    };
    if (tokenInput.value) refresh();
  </script>
</body>
</html>
