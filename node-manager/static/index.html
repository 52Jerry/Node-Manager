<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Manager Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #00d9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar h1::before {
            content: '⚡';
            font-size: 28px;
        }

        .nav-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-item:hover {
            background: rgba(0, 217, 255, 0.1);
            color: #00d9ff;
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(138, 43, 226, 0.2));
            color: #00d9ff;
            border-left: 3px solid #00d9ff;
        }

        .nav-item::before {
            font-size: 20px;
        }

        .nav-status::before { content: '📊'; }
        .nav-users::before { content: '👥'; }
        .nav-create::before { content: '➕'; }
        .nav-proxy::before { content: '🔗'; }
        .nav-reload::before { content: '🔄'; }

        .main-content {
            margin-left: 280px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 32px;
            font-weight: 600;
        }

        .token-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .token-input input {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            width: 300px;
        }

        .token-input button {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #00d9ff, #8b2be2);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .token-input button:hover {
            transform: translateY(-2px);
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.1);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
        }

        .card-value.green { color: #00ff88; }
        .card-value.red { color: #ff4757; }
        .card-value.blue { color: #00d9ff; }
        .card-value.yellow { color: #ffd93d; }

        .section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #8b2be2);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00d66a);
            color: #000;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .form-group .checkbox-group {
            display: flex;
            gap: 20px;
        }

        .form-group .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-group .checkbox-item input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .copy-btn {
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #00d9ff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .result-box {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-box.error {
            background: rgba(255, 71, 87, 0.1);
            border-color: rgba(255, 71, 87, 0.3);
        }

        .result-box h4 {
            margin-bottom: 15px;
            color: #00ff88;
        }

        .result-box.error h4 {
            color: #ff4757;
        }

        .result-item {
            margin-bottom: 10px;
        }

        .result-item label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            display: block;
            margin-bottom: 5px;
        }

        .result-item code {
            font-size: 13px;
            word-break: break-all;
            color: #00d9ff;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state::before {
            content: '📭';
            font-size: 60px;
            display: block;
            margin-bottom: 20px;
        }

        .traffic-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .traffic-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Node Manager</h1>
        <div class="nav-item nav-status active" onclick="switchTab('status')">状态监控</div>
        <div class="nav-item nav-users" onclick="switchTab('users')">用户管理</div>
        <div class="nav-item nav-create" onclick="openCreateModal()">创建用户</div>
        <div class="nav-item nav-proxy" onclick="openProxyModal()">绑定代理</div>
        <div class="nav-item nav-reload" onclick="reloadSingbox()">重启服务</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="page-title">状态监控</h2>
            <div class="token-input">
                <input type="text" id="token" placeholder="输入 Token" value="abc123456789">
                <button onclick="saveToken()">保存</button>
            </div>
        </div>

        <div id="tab-status">
            <div class="status-cards">
                <div class="card">
                    <div class="card-icon">📍</div>
                    <div class="card-title">节点名称</div>
                    <div class="card-value blue" id="status-node">-</div>
                </div>
                <div class="card">
                    <div class="card-icon">🔵</div>
                    <div class="card-title">Sing-box状态</div>
                    <div class="card-value" id="status-singbox">-</div>
                </div>
                <div class="card">
                    <div class="card-icon">💻</div>
                    <div class="card-title">CPU使用率</div>
                    <div class="card-value yellow" id="status-cpu">-</div>
                </div>
                <div class="card">
                    <div class="card-icon">📊</div>
                    <div class="card-title">内存使用率</div>
                    <div class="card-value yellow" id="status-memory">-</div>
                </div>
                <div class="card">
                    <div class="card-icon">🔗</div>
                    <div class="card-title">网络连接</div>
                    <div class="card-value blue" id="status-connections">-</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div class="section-title">系统资源</div>
                    <button class="btn btn-primary" onclick="refreshStatus()">刷新</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div>
                        <label style="display: block; margin-bottom: 10px;">CPU 使用率</label>
                        <div class="traffic-bar">
                            <div class="traffic-bar-fill" id="cpu-bar" style="width: 0%"></div>
                        </div>
                        <div style="text-align: right; margin-top: 5px; font-size: 12px; color: rgba(255,255,255,0.6);" id="cpu-text">0%</div>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 10px;">内存使用率</label>
                        <div class="traffic-bar">
                            <div class="traffic-bar-fill" id="memory-bar" style="width: 0%"></div>
                        </div>
                        <div style="text-align: right; margin-top: 5px; font-size: 12px; color: rgba(255,255,255,0.6);" id="memory-text">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-users" style="display: none;">
            <div class="section">
                <div class="section-header">
                    <div class="section-title">用户列表</div>
                    <button class="btn btn-primary" onclick="loadUsers()">刷新</button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>用户ID</th>
                            <th>UUID</th>
                            <th>协议</th>
                            <th>上传流量</th>
                            <th>下载流量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <tr>
                            <td colspan="6" class="empty-state">暂无用户</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-create">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建用户</h3>
                <button class="modal-close" onclick="closeModal('modal-create')">×</button>
            </div>
            <div class="form-group">
                <label>用户ID</label>
                <input type="text" id="create-user-id" placeholder="例如：10001">
            </div>
            <div class="form-group">
                <label>协议类型</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="proto-vless" checked>
                        <label for="proto-vless">VLESS</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="proto-vmess" checked>
                        <label for="proto-vmess">VMess</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="proto-socks" checked>
                        <label for="proto-socks">SOCKS5</label>
                    </div>
                </div>
            </div>
            <div id="create-result"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('modal-create')">取消</button>
                <button class="btn btn-primary" onclick="createUser()">创建</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-proxy">
        <div class="modal-content">
            <div class="modal-header">
                <h3>绑定代理</h3>
                <button class="modal-close" onclick="closeModal('modal-proxy')">×</button>
            </div>
            <div class="form-group">
                <label>用户ID</label>
                <input type="text" id="proxy-user-id" placeholder="例如：10001">
            </div>
            <div class="form-group">
                <label>代理类型</label>
                <select id="proxy-type">
                    <option value="socks5">SOCKS5</option>
                </select>
            </div>
            <div class="form-group">
                <label>服务器地址</label>
                <input type="text" id="proxy-server" placeholder="例如：1.2.3.4">
            </div>
            <div class="form-group">
                <label>端口</label>
                <input type="number" id="proxy-port" placeholder="例如：1080" value="1080">
            </div>
            <div class="form-group">
                <label>用户名（可选）</label>
                <input type="text" id="proxy-username" placeholder="留空则不使用">
            </div>
            <div class="form-group">
                <label>密码（可选）</label>
                <input type="text" id="proxy-password" placeholder="留空则不使用">
            </div>
            <div id="proxy-result"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('modal-proxy')">取消</button>
                <button class="btn btn-primary" onclick="bindProxy()">绑定</button>
            </div>
        </div>
    </div>

    <script>
        let apiBase = 'http://localhost:8088';
        let token = localStorage.getItem('node-token') || 'abc123456789';
        document.getElementById('token').value = token;

        function saveToken() {
            token = document.getElementById('token').value;
            localStorage.setItem('node-token', token);
            alert('Token 已保存');
            refreshStatus();
        }

        function getHeaders() {
            return {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            };
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector('.nav-' + tab).classList.add('active');
            
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            
            document.getElementById('page-title').textContent = {
                'status': '状态监控',
                'users': '用户管理'
            }[tab];

            if (tab === 'users') loadUsers();
        }

        async function refreshStatus() {
            try {
                const response = await fetch(apiBase + '/api/node/status', { headers: getHeaders() });
                const data = await response.json();
                
                document.getElementById('status-node').textContent = data.node;
                document.getElementById('status-singbox').textContent = data.singbox;
                document.getElementById('status-singbox').className = 'card-value ' + (data.singbox === 'running' ? 'green' : 'red');
                document.getElementById('status-cpu').textContent = data.cpu + '%';
                document.getElementById('status-memory').textContent = data.memory + '%';
                document.getElementById('status-connections').textContent = data.connections;

                document.getElementById('cpu-bar').style.width = data.cpu + '%';
                document.getElementById('cpu-text').textContent = data.cpu + '%';
                document.getElementById('memory-bar').style.width = data.memory + '%';
                document.getElementById('memory-text').textContent = data.memory + '%';
            } catch (error) {
                console.error('Error:', error);
                alert('获取状态失败：' + error.message);
            }
        }

        async function loadUsers() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;"><span class="loading"></span>加载中...</td></tr>';

            try {
                const response = await fetch(apiBase + '/api/user/10001/traffic', { headers: getHeaders() });
                const data = await response.json();
                
                if (data.userId) {
                    tbody.innerHTML = `
                        <tr>
                            <td>${data.userId}</td>
                            <td>-----</td>
                            <td>VLESS / VMess / SOCKS5</td>
                            <td>${formatBytes(data.upload)}</td>
                            <td>${formatBytes(data.download)}</td>
                            <td>
                                <button class="btn btn-danger" style="padding:5px 15px;font-size:12px;" onclick="deleteUser('${data.userId}')">删除</button>
                            </td>
                        </tr>
                    `;
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">加载失败</td></tr>';
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function openCreateModal() {
            document.getElementById('modal-create').classList.add('active');
            document.getElementById('create-result').innerHTML = '';
        }

        function openProxyModal() {
            document.getElementById('modal-proxy').classList.add('active');
            document.getElementById('proxy-result').innerHTML = '';
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function createUser() {
            const userId = document.getElementById('create-user-id').value;
            if (!userId) {
                alert('请输入用户ID');
                return;
            }

            const protocols = [];
            if (document.getElementById('proto-vless').checked) protocols.push('vless');
            if (document.getElementById('proto-vmess').checked) protocols.push('vmess');
            if (document.getElementById('proto-socks').checked) protocols.push('socks');

            const resultDiv = document.getElementById('create-result');
            resultDiv.innerHTML = '<div style="text-align:center;"><span class="loading"></span>创建中...</div>';

            try {
                const response = await fetch(apiBase + '/api/user/create', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ userId, protocols })
                });

                const data = await response.json();

                if (response.ok) {
                    let html = '<div class="result-box"><h4>创建成功！</h4>';
                    html += '<div class="result-item"><label>用户ID</label><code>' + data.userId + '</code></div>';
                    html += '<div class="result-item"><label>UUID</label><code>' + data.uuid + '</code></div>';
                    if (data.vless) {
                        html += '<div class="result-item"><label>VLESS</label><code>' + data.vless + '</code><button class="copy-btn" onclick="copyText(\'' + data.vless + '\')">复制</button></div>';
                    }
                    if (data.vmess) {
                        html += '<div class="result-item"><label>VMess</label><code>' + data.vmess + '</code><button class="copy-btn" onclick="copyText(\'' + data.vmess + '\')">复制</button></div>';
                    }
                    if (data.socks) {
                        html += '<div class="result-item"><label>SOCKS5</label><code>' + JSON.stringify(data.socks) + '</code></div>';
                    }
                    html += '</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="result-box error"><h4>创建失败</h4><p>' + data.detail + '</p></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="result-box error"><h4>创建失败</h4><p>' + error.message + '</p></div>';
            }
        }

        async function bindProxy() {
            const userId = document.getElementById('proxy-user-id').value;
            const server = document.getElementById('proxy-server').value;
            const port = document.getElementById('proxy-port').value;

            if (!userId || !server || !port) {
                alert('请填写必填项');
                return;
            }

            const resultDiv = document.getElementById('proxy-result');
            resultDiv.innerHTML = '<div style="text-align:center;"><span class="loading"></span>绑定中...</div>';

            try {
                const response = await fetch(apiBase + '/api/user/bind-proxy', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        userId,
                        proxy: {
                            type: document.getElementById('proxy-type').value,
                            server,
                            port: parseInt(port),
                            username: document.getElementById('proxy-username').value || undefined,
                            password: document.getElementById('proxy-password').value || undefined
                        }
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    resultDiv.innerHTML = '<div class="result-box"><h4>绑定成功！</h4><p>住宅代理已绑定到用户 ' + userId + '</p></div>';
                } else {
                    resultDiv.innerHTML = '<div class="result-box error"><h4>绑定失败</h4><p>' + (data.detail || '未知错误') + '</p></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="result-box error"><h4>绑定失败</h4><p>' + error.message + '</p></div>';
            }
        }

        async function deleteUser(userId) {
            if (!confirm('确定要删除用户 ' + userId + ' 吗？')) return;

            try {
                const response = await fetch(apiBase + '/api/user/delete/' + userId, {
                    method: 'DELETE',
                    headers: getHeaders()
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('删除成功');
                    loadUsers();
                } else {
                    alert('删除失败：' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        async function reloadSingbox() {
            if (!confirm('确定要重启 sing-box 服务吗？')) return;

            try {
                const response = await fetch(apiBase + '/api/singbox/reload', {
                    method: 'POST',
                    headers: getHeaders()
                });

                const data = await response.json();

                if (data.success) {
                    alert('重启成功');
                    refreshStatus();
                } else {
                    alert('重启失败');
                }
            } catch (error) {
                alert('重启失败：' + error.message);
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('已复制到剪贴板');
        }

        refreshStatus();
    </script>
</body>
</html>
